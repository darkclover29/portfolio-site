<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>404 — Harsh Tiwari Portfolio</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0c0f;color:#e2e8f0;font-family:'JetBrains Mono',monospace;
         display:flex;align-items:center;justify-content:center;min-height:100vh;
         flex-direction:column;gap:20px;padding:24px;text-align:center}
    .code{font-size:clamp(4rem,15vw,8rem);font-weight:800;color:#fff;
          text-shadow:0 0 40px rgba(255,255,255,0.15);letter-spacing:-4px;line-height:1}
    .msg{font-size:.95rem;color:#64748b;max-width:320px;line-height:1.6}
    .msg span{color:#94a3b8}
    a{display:inline-flex;align-items:center;gap:8px;margin-top:8px;
      background:#fff;color:#000;text-decoration:none;padding:10px 22px;
      border-radius:8px;font-size:.85rem;font-weight:600;
      transition:opacity .2s}
    a:hover{opacity:.85}
    .blink{animation:blink 1s step-end infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  </style>
</head>
<body>
  <div class="code">404</div>
  <p class="msg"><span>$ cd /portfolio-site<wbr/>/this-page</span><br/>bash: no such file or directory<span class="blink">_</span></p>
  <a href="/portfolio-site/">← Back to portfolio</a>
  <script>
    // GitHub Pages SPA redirect: if query string has path, redirect to it
    const q = new URLSearchParams(location.search);
    const p = q.get('p');
    if (p) location.replace('/portfolio-site/' + p.replace(/^\//, ''));
  </script>
</body>
</html>
